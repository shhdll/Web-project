<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Planora - Edit Course</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header-func">
        <header> 
            <div class="logo">
                <a href="index.html"><img src="planora_logo.png" alt="Smart Study Planner Logo"></a>
            </div> 
            
            <nav>
                <a href="dashboard.html">DashBoard</a> | 
                <a href="courses.html">Courses</a> | 
                <a href="deadlines.html">Deadlines</a> | 
                <a href="availability.html">Availability</a> |
                <a href="study-plan.html">Study Plan</a> |
                <a href="statistics.html">Statistics</a> |
                <a href="index.html" class="btn-create">Log Out</a>
            </nav> 
        </header>
    </div>

    <h1>Edit Course</h1>

    <form onsubmit="alert('Saved successfully!'); window.location.href='courses.html'; return false;">
        <label>Course Name</label><br>
        <input class="input-format" type="text" placeholder="Web Applications Development">
        <br><br>

        <label>Course Code</label><br>
        <input class="input-format" type="text" placeholder="SWE381">
        <br><br>

        <label>Instructor</label><br>
        <input class="input-format" type="text" placeholder="Dr.Rawan">
        <br><br>

        <label>Credit Hours</label><br>
        <input class="input-format" type="number" id="creditHours" placeholder="3">
        <br><br>

        <button type="submit">Save Changes</button>

        <br>

        <a href="courses.html">Back to Courses</a>

    </form>

    <footer>
        <p>&copy 2026 Planora. All Rights Reserved. | Contact: <a href="mailto:support@planora.com">support@planora.com</a></p>
    </footer>

</body>
</html>
