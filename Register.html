<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Planora - Register </title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
  
    <a href="index.html">
        <img src="header.png" alt="Planora Header" class="banner">
    </a>

    <h1>Create An Account</h1>

    <div class="container">
        <form>

            <label>Full Name</label><br>
            <input class="input-format" type="text"
            placeholder="Muneerah Mansour" required><br><br>

            <label>Email</label><br>
            <input class="input-format" type="email" 
            placeholder="example@email.com" required><br><br>

            <label>Password</label><br>
            <input class="input-format" type="password"
                placeholder="Create a strong password" required><br><br>

            <label>Confirm Password</label><br>
            <input class="input-format" type="password"
                placeholder="Re-enter your password"required><br><br>

            <button onclick="location.href='dashboard.html'">Register</button>

        </form>
    </div>

    <div class="container">
        <p>
        Already have an account?
        <a href="login.html">Login</a> <br><br>
        return <a href="index.html">Home</a>
        </p>
    </div>

    <footer>
        <p>&copy 2026 Planora. All Rights Reserved. | Contact: <a href="mailto:support@planora.com">support@planora.com</a></p>
    </footer>


</body>
</html>
