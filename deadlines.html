    <div>
        <h1>Add a Deadline</h1>
        <p>Track your assignments and exams to stay organized.</p>
    </div>


    <form onsubmit="alert('Deadline added successfully!'); window.location.href='courses.html'; return false;">

        <!--
        <label>Course Name</label><br>
        <input type="text" placeholder="Web Applications Development" required>
        <br><br>   اذا الاضافه من الكورس مانحتاجه -->

         <label>Deadline type</label><br>
        <select class="input-format" required>
            <option value="">Select Type</option>
            <option value="exam">Exam</option>
            <option value="assignment">Assignment</option>
        </select>
        <br><br>

        <label>Title</label><br>
        <input class="input-format" type="text" placeholder="Midterm Exam" required>
        <br><br>

        <label>Deadline Date</label><br>
        <input class="input-format" type="date" required>
        <br><br>

        <label>Deadline Time</label><br>
        <input class="input-format" type="time">
        <br><br>

        <button type="submit">Add Deadline</button>
        <br>

        <a href="courses.html">Back to Courses</a>
    
    </form>
